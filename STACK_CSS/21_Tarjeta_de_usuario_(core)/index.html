<!DOCTYPE html>

    <title>Tarjeta de usuario (Core)</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <section class="contenedor-principal">
        <div class="contenedor_imagen">
            <div class="bloque-relativo">
                <img src="static/image/descarga.jpg" alt="lisa">
            </div>
        </div>
        <div class="tarjeta">
            <h1 class="titulo">Lisa Simpson</h1>
            <p class="ocupacion">Desarrolladora web</p>
            <div class="texto">
                <p class="descripcion">
                    Apasionada por el diseño web y la tecnología.
                </p>
                <p class="descripcion">
                    Siempre en busca de nuevos retos.
                </p>
            </div>
            <div class="contacto">
            <a href="#">Github</a>
            <a href="#">Linkedln</a>
            </div>
            <div class="contenedor_conectar">
                <button class="conectar">Conectar</button>
            </div>
        </div>
    </section>

</html>
