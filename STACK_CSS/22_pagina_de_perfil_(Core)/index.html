<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Iris Ccallomamani">
    <title>Página de perfil (Core)</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="titulo">Perfil</h1>
        <nav class="nav">
            <a href="#">Inicio</a>
            <a href="#">Mi perfil</a>
            <a href="#">Conexiones</a>
            <button class="cerrar-sesion">Cerrar sesión</button>
        </nav>
    </header>
    <main class="contenedor-principal">
        <section class="columna-izquierda">
            <div class="tarjeta-perfil">
                <div class="superior-tarjeta"></div>
                <div class="descripcion-tarjeta">
                    <img src="" alt="">
                    <h1></h1>
                    <p class="ubicacion">Bergen, Noruega</p>
                    <p class="info">Desarrolladora Frontend Conocimientos en HTML, CSS, JavaScript</p>
                    <button class="boton-editar">Editar perfil</button>
                </div>
            </div>
        </section>
        <section class="columna-derecha">
            <div class="tarjeta-conexiones">
                <div class="row menu">
                <h2 class="panel-titulo">Solicitudes de conexión</h2>
                </div>
                <div class="boton">
                    <button class="ver-todas">Ver todas</button>
                </div>
                <div class="row">
                    <p class="solicitud">Steve Jobs</p>
                    <button>
                        <img src="static/images/si - no.jpg" alt="Si-O-No" class="boton-x">
                        <img src="static/images/" alt="Si-O-No" class="boton-v">
                    </button>
                </div>
                <div class="row">
                    <p class="solicitud">Bill Gates</p>
                    <button>
                        <img src="static/images/si - no.jpg" alt="Si-O-No" class="boton-x">
                        <img src="static/images/" alt="Si-O-No" class="boton-v">
                    </button>
                </div>
            </div>
            <div class="tarjeta-conexiones">
                <div class="row menu">
                    <h2 class="panel-titulo">Tus conexiones</h2>
                </div>
                <div class="boton">
                    <button class="ver-todas">Ver todas</button>
                </div>
                <div class="row">Richard Stallman</div>
                <div class="row">Linus Torvalds</div>
                <div class="row">Ada Lovelace</div>
                <div class="row">Grace Hopper</div>
            </div>
        </section>
    </main>
    <footer class="footer">
    </footer>
</body>
</html>
