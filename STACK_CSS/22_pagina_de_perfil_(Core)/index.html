<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Iris Ccallomamani">
    <title>Página de perfil (Core)</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <h1 class="titulo">Perfil</h1>
        <nav class="nav">
            <a href="#">Inicio</a>
            <a href="#">Mi perfil</a>
            <a href="#">Conexiones</a>
            <button class="cerrar-sesion">Cerrar sesión</button>
        </nav>
    </header>
    <main class="contenedor-principal">
        <section class="columna-izquierda">
            <div class="tarjeta-perfil">
                <div class="superior-tarjeta"></div>
                <div class="descripcion-tarjeta">
                    <img src="static/images/perfil.png" alt="foto">
                    <h1 class="usuario">Jane Doe</h1>
                    <p class="ubicacion">Bergen, Noruega</p>
                    <p class="info">Desarrolladora Frontend Conocimientos en HTML, CSS, JavaScript</p>
                    <button class="boton-editar">
                        <img src="static/images/editar-perfil.png" alt="engranaje"></button>
                </div>
            </div>
        </section>
        <section class="columna-derecha">
            <div class="tarjeta-conexiones">
                <div class="row">
                    <h2 class="titulo-panel">Solicitudes de conexión</h2>
                    <button class="ver-todas">Ver todas</button>
                </div>
                <div class="row">
                    <div class="perfil">
                        <img src="static/images/foto.jpg" alt="foto perfil">
                        <p class="solicitud">Steve Jobs</p>
                    </div>
                    <img src="static/images/si - no.jpg" alt="Si-O-No">
                </div>
                <div class="row">
                    <div class="perfil">
                        <img src="static/images/foto.jpg" alt="foto perfil">
                        <p class="solicitud">Bill Gates</p>
                    </div>
                    <img src="static/images/si - no.jpg" alt="Si-O-No">
                </div>
            </div>
            <div class="tarjeta-conexiones">
                <div class="row menu">
                    <h2 class="titulo-panel">Tus conexiones</h2>
                    <div class="boton">
                        <button class="ver-todas">Ver todas</button>
                    </div>
                </div>
                <div class="row">
                    <div class="perfil">
                        <img src="static/images/foto.jpg" alt="foto perfil">
                        <p class="conexion">Richard Stallman</p>
                    </div>
                </div>
                <div class="row">
                    <div class="perfil">
                        <img src="static/images/foto.jpg" alt="foto perfil">
                        <p class="conexion">Linus Torvalds</p>
                    </div>
                </div>
                <div class="row">
                    <div class="perfil">
                        <img src="static/images/foto.jpg" alt="foto perfil">
                        <p class="conexion">Ada Lovelace</p>
                    </div>
                </div>
                <div class="row">
                    <div class="perfil">
                        <img src="static/images/foto.jpg" alt="foto perfil">
                        <p class="conexion">Grace Hopper</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
    </footer>
</body>

</html>
