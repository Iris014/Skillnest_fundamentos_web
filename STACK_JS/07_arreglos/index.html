<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arreglos JS</title>
    <meta name="author" contebt="Iris Ccallomamani">
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="contenedor">

        <h1>Arreglos / Listas / Array</h1>

        <div class="card">
            <h2>Ejercicio 1</h2>
            <p>Conteo de interacciones</p>
            <button onclick="contarInteracciones()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 2</h2>
            <p>Simulación de barra de carga</p>
            <button onclick="simularCarga()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 3</h2>
            <p>Descuento progresivo</p>
            <button onclick="descuentoTienda()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 4</h2>
            <p>Calculo del total de puntos</p>
            <button onclick="calcularPuntos()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 5</h2>
            <p>Contador de notificaciones</p>
            <button onclick="contarNotificacion()">Ejecutar</button>
        </div>

    </div>
    <script src="static/js/script.js"></script>
</body>

</html>
