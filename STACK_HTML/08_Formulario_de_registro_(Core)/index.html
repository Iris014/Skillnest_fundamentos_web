<!DOCTYPE html>
    <html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <form action="#" method="POST">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
        </div>
        <div>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">
        </div>
        <div>
            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" name="clave">
        </div>
        <div>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>
        <div>
            <label>Género:</label>
            <input type="radio" name="genero" value="masculino"> <!--Elemento de selección única-->
            Masculino
            <input type="radio" name="genero" value="femenino">
            Femenino<br>
        </div>

        <div style="height: 80px; width: 150px; border: 1px solid #000; overflow: auto;">
            <p>Opción 1</p>
            <p>Opción 2</p>
            <p>Opción 3</p>
            <p>Opción 4</p>
        </div>


        <div>
                <label>Intereses:</label><br>
                <input type="checkbox" name="intereses" value="musica"> 
                Música<br>
                <input type="checkbox" name="intereses" value="deportes"> 
                Deportes<br>
                <input type="checkbox" name="intereses" value="peliculas">
                Peliculas
                <br><br>
        </div>


            <label for="bandas">Bandas favoritas:</label>
            <select id="bandas" name="bandas">
                <option value="imagine_dragons">Imagine Dragons</option>
                <option value="the_weeknd">The Weeknd</option>
                <option value="twenty_one_pilots">Twenty One Pilots</option>
            </select>
        </div>



        <div>
            <input type="checkbox" id="acepto" name="acepto">
            <label for="acepto">Al registrarte, aceptas los Términos y condiciones de Discord</label>
        </div>
        <div>
            <label for="comentario">Descripción sobre ti:</label><br>
            <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
        </div>

        <input type="submit" value="Enviar">
    </form>
</body>
</html>
