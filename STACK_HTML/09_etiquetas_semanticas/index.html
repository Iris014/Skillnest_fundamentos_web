    <!DOCTYPE html>
<html lang="es">


    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>


<body><!--Cuerpo del documento-->
    <header><!--Encabezado de la página-->
        <h1>Iniciar sesión</h1>
        <nav><!--Barra de navegación con enlaces -->
            <ul>
                <li>Inicio</li>
                <li>Nosotros</li>
                <li>Contacto</li>
            </ul>
        </nav>
    </header>
    <main><!--Sección principal de la página-->
        <section>
            <article><!--Artículo con información específica-->
                <h2>Hola soy un articulo!</h2>
                <br>
                <p>Parrafo de un articulo</p>
            </article>
        </section>
    <section><!--Contenedor al gigual que un div-->
        <form action="/login" method="post">
            <div>
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div>
                <input type="checkbox" id="recordarme" name="recordarme">
                <label for="recordarme">Recordarme</label>
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </section>
    </main>
</body>
</html>
