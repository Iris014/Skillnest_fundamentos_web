<!--Tarea formulario: Crear un formulario de registro
    para un sitio web para renovar una hora al doctor
    Debe incluir: Nombre del paciente, fecha de cita,
    Fecha_nacimiento, Sintomas del paciente, Ciudad (lista_desplegable),
    Casilla de verificación-->
<DOCTYPE html>
<html lang="en">
<head>
    <meta chartset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <h1>Formulario de registro para renovación</h1>
</head>
<body>
    <form action="/registro" method="post">
        <div>
            <label for="nombre_completo">Nombre del paciente:</label>
            <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Ingresa tu nombre">
        </div>

        <div>
            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo" name="correo" placeholder="Ingresa tu correo">
        </div>

        <div>
                <label>Fecha de cita:</label>
                <input type="date" name="FechaCita">
        </div>

        <div>
                <label>Sintomas del paciente:</label><br>
                <input type="checkbox" name="sintomas" value="tos"> 
                Tos<br>
                <input type="checkbox" name="sintomas" value="gripe"> 
                Gripe<br>
                <input type="checkbox" name="sintomas" value="fiebre">
                Fiebre
        </div>
        <div>
            <label for="ciudad">Ciudad:</label>
            <select id="ciudad" name="ciudad">
                <option value="santiago">Santiago</option>
                <option value="concepcion">Concepción</option>
                <option value="iquique">Iquique</option>
                <option value="valparaiso">Valparaíso</option>
            </select>
        </div>

        <div>
            <p><em>Para más información:</em></p>
            <input type="checkbox" id="suscribirse" name="suscribirse" checked>
            <label for="suscribirse">Deseo suscribirme al boletín informativo.</label>
        </div>

        <div>
            <input type="submit" value="Registrarse para renovar una hora">
        </div>
        
    </form>
</body>

</html>
